name: TPUSA Monitor Sweep

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sweep
        env:
          MCP_URL: "https://workspace-production-9f91.up.railway.app/mcp"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/tpusa_sweep.py
